name: MaJuVi
mgmt:
  network: mgmt-net
  ipv4-subnet: 172.20.20.0/24

topology:
  nodes:
    # ==========================================
    # INTERNAL NETWORK
    # ==========================================
    Internal_Switch:
      kind: linux
      image: frrouting/frr:latest
      type: bridge
      group: switch
      cap-add:
        - NET_ADMIN
        - NET_RAW

    Internal_Client1:
      kind: linux
      image: alpine:latest
      type: host
      group: server
      cap-add:
        - NET_ADMIN

    Internal_Client2:
      kind: linux
      image: alpine:latest
      type: host
      group: server
      cap-add:
        - NET_ADMIN

    Admin_PC:
      kind: linux
      image: alpine:latest
      type: host
      group: server
      cap-add:
        - NET_ADMIN

    Internal_FW:
      kind: linux
      image: ubuntu:latest
      type: host
      group: firewall
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW

    IDS2:
      kind: linux
      image: jasonish/suricata:latest
      group: ids
      cap-add:
        - NET_ADMIN
        - NET_RAW

    # ==========================================
    # DMZ NETWORK
    # ==========================================
    DMZ_Switch:
      kind: linux
      image: frrouting/frr:latest
      type: bridge
      group: switch
      cap-add:
        - NET_ADMIN
        - NET_RAW

    Flask_Webserver:
      kind: linux
      image: nginx:latest
      group: server
      ports:
        - "5000:5000"
      cap-add:
        - NET_ADMIN

    Proxy_WAF:
      kind: linux
      image: owasp/modsecurity-crs:nginx
      group: firewall
      ports:
        - "8181:8080"
      cap-add:
        - NET_ADMIN
        - NET_RAW

    Database:
      kind: linux
      image: postgres:16
      group: server
      env:
        POSTGRES_USER: admin_user
        POSTGRES_PASSWORD: securePassword123
        POSTGRES_DB: mydatabase
      ports:
        - "3636:5432"
      cap-add:
        - NET_ADMIN

    IDS:
      kind: linux
      image: jasonish/suricata:latest
      group: ids
      cap-add:
        - NET_ADMIN
        - NET_RAW

    External_FW:
      kind: linux
      image: debian:bookworm-slim
      type: host
      group: firewall
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW

    # ==========================================
    # SIEM NETWORK
    # ==========================================
    SIEM_FW:
      kind: linux
      image: debian:bookworm-slim
      type: host
      group: firewall
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW

    elasticsearch:
      kind: linux
      image: docker.elastic.co/elasticsearch/elasticsearch:9.2.1
      group: siem
      env:
        discovery.type: single-node
        xpack.security.enabled: "false"
        ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      ports:
        - "9200:9200"
      cap-add:
        - NET_ADMIN

    logstash:
      kind: linux
      image: docker.elastic.co/logstash/logstash:9.2.1
      group: siem
      env:
        XPACK_MONITORING_ENABLED: "false"
      cap-add:
        - NET_ADMIN

    kibana:
      kind: linux
      image: docker.elastic.co/kibana/kibana:9.2.1
      group: siem
      env:
        ELASTICSEARCH_HOSTS: "http://10.0.3.26:9200"
      ports:
        - "5601:5601"
      cap-add:
        - NET_ADMIN

    # ==========================================
    # EDGE / INTERNET
    # ==========================================
    router-edge:
      kind: linux
      image: frrouting/frr:latest
      type: host
      group: router
      cap-add:
        - NET_ADMIN
        - NET_RAW

    router-internet:
      kind: linux
      image: frrouting/frr:latest
      type: host
      group: router
      cap-add:
        - NET_ADMIN
        - NET_RAW

    Attacker:
      kind: linux
      image: kalilinux/kali-rolling
      type: host
      group: server
      cap-add:
        - NET_ADMIN

  # ==========================================
  # LINKS (Topology Connections)
  # ==========================================
  links:
    # Internal Network
    - endpoints: ["Internal_Client1:eth1", "Internal_Switch:eth1"]
    - endpoints: ["Internal_Client2:eth1", "Internal_Switch:eth2"]
    - endpoints: ["Internal_Switch:eth3", "Internal_FW:eth1"]
    - endpoints: ["Internal_Switch:eth4", "IDS2:eth1"]
    
    # Internal FW to DMZ/External
    - endpoints: ["Internal_FW:eth2", "DMZ_Switch:eth1"]
    - endpoints: ["Internal_FW:eth3", "External_FW:eth4"]
    - endpoints: ["Internal_FW:eth4", "SIEM_FW:eth1"]
    
    # DMZ Network
    - endpoints: ["DMZ_Switch:eth2", "External_FW:eth1"]
    - endpoints: ["DMZ_Switch:eth3", "Proxy_WAF:eth1"]
    - endpoints: ["DMZ_Switch:eth4", "IDS:eth1"]
    - endpoints: ["Proxy_WAF:eth2", "Flask_Webserver:eth1"]
    - endpoints: ["Proxy_WAF:eth3", "SIEM_FW:eth9"]
    - endpoints: ["Flask_Webserver:eth2", "Database:eth1"]
    
    # IDS to SIEM
    - endpoints: ["IDS:eth2", "SIEM_FW:eth7"]
    - endpoints: ["IDS2:eth2", "SIEM_FW:eth8"]
    
    # External FW
    - endpoints: ["External_FW:eth2", "router-edge:eth2"]
    - endpoints: ["External_FW:eth3", "SIEM_FW:eth2"]
    
    # SIEM Network
    - endpoints: ["SIEM_FW:eth3", "logstash:eth1"]
    - endpoints: ["SIEM_FW:eth4", "elasticsearch:eth3"]
    - endpoints: ["SIEM_FW:eth5", "kibana:eth2"]
    - endpoints: ["SIEM_FW:eth6", "Admin_PC:eth1"]
    
    - endpoints: ["logstash:eth2", "elasticsearch:eth1"]
    - endpoints: ["elasticsearch:eth2", "kibana:eth1"]
    
    # Edge / Internet
    - endpoints: ["router-edge:eth1", "router-internet:eth2"]
    - endpoints: ["router-internet:eth1", "Attacker:eth1"]
